<div class="h-[75vh] overflow-auto rounded-box border border-base-content/5 bg-base-100">
  <table class="table">
    <thead>
      <tr>
        <th>Email</th>
        <th>Roles</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody>
      @for (user of users(); track user.id) {
      <tr>
        <td>{{user.email}}</td>
        <td>{{user.roles}}</td>
        <td>
          <button class="btn btn-primary" (click)="openRolesModal(user)">Edit Roles</button>
        </td>
      </tr>
      }
    </tbody>
  </table>
</div>

<dialog #rolesModal class="modal">
  <div class="modal-box">
    <h3 class="text-lg font-bold">Edit roles for {{seletcedUser?.email}}</h3>

    <fieldset class="fieldset w-full p-4 bg-base-100 border border-base-300 rounded-box">
      <legend class="fieldset-legend">Select roles</legend>
      @for (role of availableRoles; track $index) {
      <label class="fieldset-label">
        <input type="checkbox" class="checkbox" [checked]="seletcedUser?.roles?.includes(role)"
          [disabled]="seletcedUser?.email == 'admin@test.email' && role ==='Admin'" (change)="toggleRole($event, role)">
        {{role}}
      </label>
      }
    </fieldset>
    <div class="modal-action">
      <button class="btn btn-primary" (click)="updateRoles()">
        Submit
      </button>
    </div>
  </div>
  <form method="dialog" class="modal-backdrop">
    <button>Close</button>
  </form>
</dialog>
